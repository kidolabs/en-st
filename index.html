<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Stories for Kids 🎈</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%88%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=15" />
</head>
<body>
  <!-- Access gate (casual privacy, not real security) -->
  <div id="gate" class="gate">
    <form class="gate-box" id="gate-form">
      <div class="gate-emoji">🎈🔒</div>
      <div class="gate-title">English Stories</div>
      <p class="gate-sub">Nhập mật khẩu để vào học nhé</p>
      <input id="gate-input" class="gate-input" type="password" inputmode="numeric" autocomplete="off" placeholder="• • • • • •" />
      <button type="submit" class="gate-btn">Vào học 🚀</button>
      <p id="gate-err" class="gate-err" hidden>Sai mật khẩu, thử lại nhé! 🙈</p>
    </form>
  </div>

  <header class="topbar">
    <div class="brand">🎈 English Stories</div>
    <input id="search" class="search" type="search" placeholder="🔍 Tìm truyện..." autocomplete="off" />
  </header>

  <main>
    <!-- VIEW 1: home — topic cards -->
    <section id="home-view">
      <div id="levels" class="levels"></div>
      <div id="grid" class="grid" aria-live="polite"></div>
      <p id="empty" class="empty" hidden>Không tìm thấy truyện nào 🙈</p>
    </section>

    <!-- VIEW 2: topic — episode sub-cards -->
    <section id="topic-view" hidden>
      <div class="subhead">
        <button class="backbtn" id="back-home">← Tất cả truyện</button>
        <h1 id="topic-title" class="subhead-title"></h1>
        <button class="backbtn listen-topic" id="listen-topic">🎧 Nghe truyện này</button>
      </div>
      <div class="subsearch">
        <input id="ep-search" class="search" type="search" placeholder="🔍 Tìm tập trong truyện này..." autocomplete="off" />
      </div>
      <div id="ep-grid" class="grid"></div>
    </section>

    <!-- VIEW 3: player — modal box (video pinned, related cards scroll inside) -->
    <div id="player-view" class="modal" hidden>
      <div class="modal-box">
        <div class="modal-head">
          <span id="back-topic-name" class="modal-title"></span>
          <button class="closebtn" id="close-modal" aria-label="Đóng">✕</button>
        </div>
        <video id="video" class="video" controls autoplay playsinline crossorigin="anonymous" preload="metadata"></video>
        <div id="now-playing" class="now-playing"></div>
        <div class="stage-bar">
          <button id="prev" class="navbtn">◀ Tập trước</button>
          <button id="cc" class="ccbtn" aria-pressed="false">CC phụ đề: TẮT</button>
          <button id="capsize" class="ccbtn sizebtn" hidden>🔠 Cỡ chữ: Vừa</button>
          <button id="loop" class="ccbtn loopbtn" aria-pressed="false">🔁 Lặp: TẮT</button>
          <button id="fs" class="navbtn fsbtn">⛶ Phóng to</button>
          <button id="listen-from-player" class="ccbtn audiobtn">🎧 Nghe MP3</button>
          <button id="next" class="navbtn">Tập sau ▶</button>
        </div>
      </div>
    </div>

    <!-- AUDIO: pick & listen modal -->
    <div id="audio-modal" class="modal" hidden>
      <div class="modal-box audio-box">
        <div class="modal-head">
          <span id="audio-modal-title" class="modal-title">🎧 Nghe MP3</span>
          <button class="closebtn" id="close-audio" aria-label="Đóng">✕</button>
        </div>
        <div class="audio-top">
          <input id="audio-search" class="search" type="search" placeholder="🔍 Tìm tập..." autocomplete="off" />
          <div class="audio-top-btns">
            <button id="play-all" class="navbtn">▶️ Phát tất cả</button>
            <button id="shuffle-all" class="navbtn">🔀 Xáo trộn</button>
          </div>
          <div id="audio-count" class="audio-count"></div>
        </div>
        <ol id="audio-list" class="audio-list"></ol>
      </div>
    </div>
  </main>

  <!-- Persistent audio player bar (keeps playing while browsing / screen off) -->
  <div id="audio-bar" class="audio-bar" hidden>
    <div class="ab-info">
      <span class="ab-emoji">🎧</span>
      <span id="ab-title" class="ab-title">—</span>
    </div>
    <div class="ab-controls">
      <button id="ab-prev" class="ab-btn" aria-label="Bài trước">⏮</button>
      <button id="ab-play" class="ab-btn ab-play" aria-label="Phát/Dừng">⏸</button>
      <button id="ab-next" class="ab-btn" aria-label="Bài sau">⏭</button>
      <button id="ab-loop" class="ab-btn ab-on" aria-pressed="true" aria-label="Lặp tất cả">🔁</button>
      <button id="ab-stop" class="ab-btn" aria-label="Tắt">✕</button>
    </div>
  </div>
  <audio id="audio" preload="none"></audio>

  <script src="app.js?v=15"></script>
</body>
</html>
