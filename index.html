<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English Stories for Kids 🎈</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%8E%88%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;700;800&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css?v=2" />
</head>
<body>
  <header class="topbar">
    <div class="brand">🎈 English Stories</div>
    <input id="search" class="search" type="search" placeholder="🔍 Tìm truyện..." autocomplete="off" />
    <div id="levels" class="levels"></div>
  </header>

  <main id="grid" class="grid" aria-live="polite"></main>
  <p id="empty" class="empty" hidden>Không tìm thấy truyện nào 🙈</p>

  <!-- Player overlay -->
  <div id="player" class="player" hidden>
    <div class="player-box">
      <button id="close" class="close" aria-label="Đóng">✕</button>
      <div class="stage">
        <video id="video" class="video" controls playsinline crossorigin="anonymous" preload="metadata"></video>
        <div class="stage-bar">
          <button id="prev" class="navbtn">⏮ Trước</button>
          <button id="cc" class="ccbtn" aria-pressed="true">CC phụ đề: BẬT</button>
          <button id="next" class="navbtn">Sau ⏭</button>
        </div>
      </div>
      <aside class="episodes">
        <h2 id="ep-title" class="ep-title"></h2>
        <ol id="ep-list" class="ep-list"></ol>
      </aside>
    </div>
  </div>

  <script src="app.js?v=2"></script>
</body>
</html>
